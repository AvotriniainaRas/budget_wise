name: budget_wise
description: "BudgetWise — Application de gestion de budget personnel."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# ─────────────────────────────────────────
#  DÉPENDANCES PRINCIPALES
# ─────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:    # ← ajouter
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Base de données locale
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.2.0

  # Graphiques
  fl_chart: ^0.68.0

  # Génération de modèles (annotations seulement)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Export
  pdf: ^3.11.0
  csv: ^6.0.0

  # UI & utilitaires
  intl: ^0.20.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  path_provider: ^2.1.3
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  gap: ^3.0.1

# ─────────────────────────────────────────
#  DÉPENDANCES DE DÉVELOPPEMENT
# ─────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Génération de code
  build_runner: ^2.4.11
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0    # version abaissée pour compatibilité
  json_serializable: ^6.8.0
  riverpod_annotation: ^2.3.5   # déplacer aussi en dev si besoin

  # Qualité du code
  flutter_lints: ^4.0.0

  flutter_launcher_icons: ^0.14.1

# ─────────────────────────────────────────
#  ASSETS
# ─────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android:                    true
  ios:                        true
  image_path:                 "assets/images/logo.png"
  min_sdk_android:            21
  adaptive_icon_background:   "#5C6BC0"
  adaptive_icon_foreground:   "assets/images/logo.png"
  web:
    generate: false